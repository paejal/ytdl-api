version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:20.11

    environment:
      PORT: 3500

    steps:
      - checkout

      - run:
          name: Install Dependencies
          command: npm install

      - run:
          name: Start App
          command: npm start

workflows:
  version: 2
  build_and_run:
    jobs:
      - build
